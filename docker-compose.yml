services:
  monitor:
    build: .
    container_name: regen-agent
    env_file: .env
    ports:
      - "3099:3099"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3099/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3

  trading-desk:
    build: .
    container_name: regen-trading-desk
    env_file: .env
    command: ["node", "--enable-source-maps", "dist/trading-desk.js"]
    volumes:
      - ./data:/app/data
    profiles: ["trading"]
    # Run via: docker compose --profile trading run --rm trading-desk
    # Or schedule with cron on the host
